<!-- Hero Content Cluster -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl px-8 text-center mt-20 md:mt-0">

<div class="relative flex items-center justify-center w-32 h-32 md:w-40 md:h-40 bg-gradient-to-tr from-surface-container-lowest to-surface-container-high rounded-full border border-outline-variant/10 shadow-2xl">

</div>
</div>
<!-- Editorial Headline -->
<div class="space-y-6">
<h1 class="font-headline italic text-5xl md:text-7xl tracking-tighter text-on-surface leading-none">

            </h1>
<p class="font-headline text-xl md:text-2xl text-on-surface-variant font-light italic opacity-80 max-w-md mx-auto leading-relaxed">

</div>

<div class="mt-16 w-1 h-12 bg-gradient-to-b from-primary/40 to-transparent rounded-full opacity-50"></div>
</main>

<section class="w-full max-w-sm px-8 pb-12 flex flex-col items-center space-y-12">

</button>

<div class="flex flex-col items-center space-y-8">
<p class="font-label text-xs uppercase tracking-[0.3em] text-on-surface-variant/40 hover:text-on-surface transition-colors cursor-pointer">
