name: Moula Flow CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test

 # ÉTAPE 2 : Build
  build:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45 # On donne assez de temps, surtout pour Windows
    strategy:
      fail-fast: false # TRÈS IMPORTANT : empêche un échec Linux de tuer le build Windows
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            cmd: flutter build linux --release && tar -czf moula-flow-linux.tar.gz -C build/linux/x64/release/bundle .
            file: moula-flow-linux.tar.gz
          - os: windows-latest
            platform: windows
            # Utilisation de 7z pour Windows (plus robuste sur CI)
            cmd: flutter build windows --release && 7z a -tzip moula-flow-windows.zip .\build\windows\x64\runner\Release\*
            file: moula-flow-windows.zip
          - os: ubuntu-latest
            platform: android
            cmd: flutter build apk --release && cp build/app/outputs/flutter-apk/app-release.apk moula-flow.apk
            file: moula-flow.apk

steps:
      - uses: actions/checkout@v4

      # 1. Configuration de Java (Essentiel pour Android)
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. Configuration de Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Dépendances Linux
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # 4. Récupération des packages (Indispensable car nouveau Job)
      - name: Install dependencies
        run: flutter pub get

      # 5. Build final
      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.file }}
          
  # ÉTAPE 3 : Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
