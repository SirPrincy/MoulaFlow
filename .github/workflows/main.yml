name: Moula Flow CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : Tests unitaires
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test

  # ÉTAPE 2 : Compilation Multi-plateforme
  build:
    needs: test
    # On compile si c'est un push sur main OU si c'est un tag de version
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false # Empêche qu'une erreur sur un OS n'arrête les autres
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            cmd: flutter build linux --release && tar -czf moula-flow-linux.tar.gz -C build/linux/x64/release/bundle .
            file: moula-flow-linux.tar.gz
          - os: windows-latest
            platform: windows
            cmd: flutter build windows --release && 7z a -tzip moula-flow-windows.zip .\build\windows\x64\runner\Release\*
            file: moula-flow-windows.zip
          - os: ubuntu-latest
            platform: android
            cmd: flutter build apk --release && cp build/app/outputs/flutter-apk/app-release.apk moula-flow.apk
            file: moula-flow.apk

    steps:
      - uses: actions/checkout@v4

      # Configuration Java (obligatoire pour Android)
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Configuration Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Dépendances système pour Linux
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # Récupération des packages Flutter (nécessaire pour chaque job)
      - name: Install Flutter dependencies
        run: flutter pub get

      # Exécution du build selon la plateforme
      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.cmd }}

      # Sauvegarde de l'exécutable
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.file }}

  # ÉTAPE 3 : Création de la Release (uniquement sur tags v*)
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
